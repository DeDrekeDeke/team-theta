server:
  port: ${PORT:8080}

spring:
  application:
    name: cv-manager-backend
  datasource:
    url: "jdbc:postgresql://${PGHOST:${POSTGRES_HOST:localhost}}:${PGPORT:${POSTGRES_PORT:5432}}/${PGDATABASE:${POSTGRES_DB:cvmanager}}"
    username: "${PGUSER:${POSTGRES_USER:cvmanager}}"
    password: "${PGPASSWORD:${POSTGRES_PASSWORD:cvmanager}}"
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  as-is:
    demo-token-prefix: demo-token
  admin:
    email: admin@example.com
    password: admin123
  cv:
    upload-dir: uploads
